name: Refresh GTFS Static Data

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday 4am UTC (noon MYT)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install jszip papaparse

      - run: node scripts/build-static.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/static.json.gz
          git diff --staged --quiet || (git commit -m "chore: refresh GTFS static data" && git push)
