<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RapidKL">
  <meta name="theme-color" content="#080c12">
  <meta name="description" content="Live bus tracking for RapidKL buses in Kuala Lumpur">
  <link rel="apple-touch-icon" href="assets/icon-180.png">
  <link rel="manifest" href="manifest.json">

  <title>RapidKL Bus Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.5.0/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div id="app">
    <main>
      <section id="map-container">
        <div id="map"></div>

        <header>
          <h1>RapidKL</h1>
          <div id="status-bar">
            <span class="status-dot" id="stat-static" title="Schedule"></span>
            <span class="status-dot" id="stat-live" title="Live feed"></span>
            <span class="status-dot" id="stat-match" title="Trip match"></span>
          </div>
          <div id="refresh-badge" title="v12">&#10227; --</div>
        </header>

        <div id="map-overlay">
          <div class="select-pill">
            <select id="route-select">
              <option value="">Select a bus route</option>
            </select>
          </div>
          <div class="select-pill">
            <select id="stop-select" disabled>
              <option value="">First select a route</option>
            </select>
          </div>
        </div>

        <div id="favorites-row">
          <div id="favorites-pills"></div>
          <button id="fav-add-btn" title="Save current route &amp; stop">+</button>
        </div>
      </section>

      <div id="bottom-bar">
        <div id="stop-progress"></div>
        <div id="bottom-info">
          <span id="stop-name">Select a route to begin</span>
          <span id="eta-text">-- min</span>
          <span id="bus-count"></span>
        </div>
      </div>
    </main>
  </div>

  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">Syncing schedule data...</p>
  </div>

  <div class="error-toast" id="error-toast"></div>

  <script src="js/gtfs-static.js?v=12"></script>
  <script src="js/favorites.js?v=12"></script>
  <script src="js/live-socket.js?v=12"></script>
  <script src="js/scheduler.js?v=12"></script>
  <script src="js/map.js?v=12"></script>
  <script src="js/ui.js?v=12"></script>
  <script src="js/app.js?v=12"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        var promises = [];
        for (var i = 0; i < registrations.length; i++) {
          promises.push(registrations[i].unregister());
        }
        return Promise.all(promises);
      }).then(function() {
        return navigator.serviceWorker.register('/sw.js?v=12');
      }).then(function() {
        console.log('[sw] v12 registered');
      }).catch(function(e) {
        console.warn('[sw] Registration:', e.message);
      });
    }
  </script>
</body>
</html>
